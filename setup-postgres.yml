- name: Setup Postgres
  hosts: all
  become: true
  remote_user: "{{ user }}"

  pre_tasks:
    - name: Install packages
      apt:
        name:
          - postgresql
          - postgresql-contrib
          - python3-psycopg2
          - acl
        state: present
        update_cache: yes

  tasks:
    - name: Start and enable postgresql
      service:
        name: postgresql
        state: started
        enabled: true

    - name: "Create app database"
      postgresql_db:
        state: present
        name: "{{ db_name }}"
      become: true
      become_user: postgres

    - name: "Create db user"
      postgresql_user:
        state: present
        name: "{{ db_user }}"
        password: "{{ db_password }}"
      become: true
      become_user: postgres

    # GRANT/REVOKE privs ON type objs TO/FROM roles
    - name: "Grant db user access to app db"
      community.postgresql.postgresql_privs:
        login_db: "{{ db_name }}"
        obj: "{{ db_name }}"
        privs: all
        type: database
        role: "{{ db_user }}"
        grant_option: false
      become: true
      become_user: postgres

    - name: "Grant db user access to public schema"
      community.postgresql.postgresql_privs:
        login_db: "{{ db_name }}"
        privs: all
        type: schema
        obj: public
        role: "{{ db_user }}"
        grant_option: false
      become: true
      become_user: postgres

    - name: Get PostgreSQL config directory
      command: psql -t -c "SHOW hba_file"
      become: true
      become_user: postgres
      register: pg_hba_path
      changed_when: false

    - name: "Allow md5 connection for the db user"
      postgresql_pg_hba:
        dest: "{{ pg_hba_path.stdout | trim }}"
        contype: host
        databases: all
        method: md5
        users: "{{ db_user }}"
        create: true
      become: true
      become_user: postgres
      notify: Restart postgresql

  handlers:
    - name: Restart postgresql
      systemd:
        name: postgresql
        state: restarted
