- name: Setup Postgres
  hosts: all
  become: true
  remote_user: "{{ user }}"

  tasks:
    - name: Install packages
      ansible.builtin.apt:
        name:
          - postgresql
          - postgresql-contrib
          - python3-psycopg2
          - acl
        state: present
        update_cache: true

    - name: Start and enable postgresql
      ansible.builtin.service:
        name: postgresql
        state: started
        enabled: true

    - name: Set password encryption to scram-sha-256
      community.postgresql.postgresql_alter_system:
        param: password_encryption
        value: scram-sha-256
      become_user: postgres
      notify: Restart postgresql

    - name: Create app database
      community.postgresql.postgresql_db:
        state: present
        name: "{{ db_name }}"
      become_user: postgres

    - name: Create db user
      community.postgresql.postgresql_user:
        state: present
        name: "{{ db_user }}"
        password: "{{ db_password }}"
      become_user: postgres

    - name: Grant db user access to app db
      community.postgresql.postgresql_privs:
        login_db: "{{ db_name }}"
        privs: ALL
        type: database
        role: "{{ db_user }}"
        grant_option: false
      become_user: postgres

    - name: Enable citext extension
      community.postgresql.postgresql_ext:
        name: citext
        login_db: "{{ db_name }}"
      become_user: postgres

    - name: Grant db user access to public schema
      community.postgresql.postgresql_privs:
        login_db: "{{ db_name }}"
        privs: ALL
        type: schema
        obj: public
        role: "{{ db_user }}"
        grant_option: false
      become_user: postgres

    - name: Get PostgreSQL hba config path
      ansible.builtin.command: psql -t -c "SHOW hba_file"
      become_user: postgres
      register: pg_hba_path
      changed_when: false

    - name: Allow scram-sha-256 connection for the db user
      community.postgresql.postgresql_pg_hba:
        dest: "{{ pg_hba_path.stdout | trim }}"
        contype: host
        databases: all
        method: scram-sha-256
        users: "{{ db_user }}"
        create: true
      become_user: postgres
      notify: Restart postgresql

  handlers:
    - name: Restart postgresql
      ansible.builtin.systemd:
        name: postgresql
        state: restarted
