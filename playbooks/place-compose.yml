- name: Place Docker Compose file
  hosts: all
  become: true
  remote_user: "{{ user }}"

  vars:
    compose_dir: /opt/{{ project_name }}

  tasks:
    - name: Create app directory
      ansible.builtin.file:
        path: "{{ compose_dir }}"
        state: directory
        owner: "{{ user }}"
        mode: "0755"

    - name: Create images directory
      ansible.builtin.file:
        path: "{{ compose_dir }}/images"
        state: directory
        owner: "{{ user }}"
        mode: "0755"

    - name: Fix images permissions every 5 minutes
      ansible.builtin.cron:
        name: "Fix imgproxy image permissions"
        minute: "*/5"
        job: "find {{ compose_dir }}/images -type f -exec chmod 644 {} \\; 2>/dev/null"
        user: root

    - name: Place docker-compose.yml
      ansible.builtin.template:
        src: ../templates/docker-compose.yml.j2
        dest: "{{ compose_dir }}/docker-compose.yml"
        owner: "{{ user }}"
        mode: "0644"
